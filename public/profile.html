<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人资料</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { overflow: hidden; }
    .profile-page { max-width: 500px; margin: 0 auto; padding-top: 44px; height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; transform: translateZ(0); background: #0f0f0f; color: #fff; }
    .profile-body { padding: 20px; }
    .titlebar { background: #1a1a1a; }
    .titlebar::after { background: rgba(255,255,255,0.12); }
    .titlebar .titlebar-back::before { border-left-color: #fff; border-bottom-color: #fff; }
    .titlebar .titlebar-title { color: #fff; }
    .upload-avatar-section { width: 80px;height: 80px;border-radius: 50%; text-align: center; margin: 24px auto; position: relative; cursor: pointer;overflow: hidden; background-color: #1a1a1a;}
    .avatar-section { text-align: center; display: inline-block; cursor: pointer; }
    .avatar-preview { width: 100%; height: 100%; object-fit: cover; background: #333; display: inline-block; }
    .avatar-overlay { position: absolute; inset: 0; border-radius: 50%;  display: flex; align-items: center; justify-content: center; ; transition: opacity 0.2s; font-size: 12px; color: #fff; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; color: #aaa; margin-bottom: 6px; font-size: 13px; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; background: #222; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; outline: none; box-sizing: border-box; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group input:focus, .form-group textarea:focus { border-color: #4a9eff; }
    .info-row { display: flex; gap: 12px; align-items: flex-end; }
    .info-row .form-group { flex: 1; }
    .save-btn { width: 100%; padding: 12px; background: #4a9eff; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .save-btn:hover { background: #3a8eef; }
    .save-btn:disabled { opacity: 0.5; }
    .msg { font-size: 13px; margin-top: 8px; display: none; }
    .msg.error { color: #ff4757; }
    .msg.success { color: #2ed573; }
    .back-link { display: block; text-align: center; color: #888; margin-top: 16px; text-decoration: none; font-size: 13px; }
    .readonly { opacity: 0.6; }
  </style>
</head>
<body>
<div class="profile-page">
  <div class="titlebar">
    <a href="javascript:history.back()" class="titlebar-back" onclick="event.preventDefault();history.back()"></a>
    <span class="titlebar-title">个人资料</span>
    <div class="titlebar-right">
      <button class="titlebar-btn" id="saveProfileBtn">保存</button>
    </div>
  </div>
  <div class="profile-body">
  <div class="upload-avatar-section" id="avatarUpload">
     <img class="avatar-preview" id="avatarPreview" src="" alt="头像" onerror="this.style.display='none'">
      <div class="avatar-overlay" id="avatarOverlay">更换头像</div>
  </div>
  <input type="file" id="avatarFileInput" accept="image/*" style="display:none">
  <div class="form-group">
    <label>邮箱</label>
    <input type="email" id="emailField" readonly class="readonly">
  </div>
  <div class="form-group">
    <label for="usernameField">用户名</label>
    <input type="text" id="usernameField" placeholder="请输入用户名">
  </div>
  <div class="form-group">
    <label for="bioField">个人简介</label>
    <textarea id="bioField" placeholder="介绍一下自己..."></textarea>
  </div>
  <div class="form-group">
    <label for="ageField">年龄</label>
    <input type="number" id="ageField" placeholder="请输入年龄（1-120）" min="1" max="120">
  </div>
  <p class="msg" id="msg"></p>
</div>
<script src="js/profile-page.js"></script>
</body>
</html>
