<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户反馈</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      padding-top: 44px;
    }
    .feedback-container {
      max-width: 420px;
      width: 100%;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }
    .stars {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .star-btn {
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .star-btn:hover { transform: scale(1.15); }
    .star-btn:active { transform: scale(0.9); }
    .star-btn svg {
      width: 100%;
      height: 100%;
    }
    .star-btn.empty svg { fill: #333; stroke: #444; }
    .star-btn.filled svg { fill: #f5a623; stroke: #f5a623; }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      display: none;
    }
    .feedback-textarea:focus { border-color: #4a9eff; }
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 16px;
      display: none;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #3a8eef; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .back-link {
      color: #888;
      text-decoration: none;
      font-size: 13px;
      margin-top: 24px;
    }
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 14px 28px;
      border-radius: 8px;
      z-index: 9999;
      font-size: 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="titlebar">
    <a href="javascript:history.back()" class="titlebar-back" onclick="event.preventDefault();history.back()"></a>
    <span class="titlebar-title">用户反馈</span>
    <div class="titlebar-right"></div>
  </div>
  <div class="feedback-container">
    <h1>用户反馈</h1>
    <p class="subtitle">请为我们的服务评分</p>
    <div class="stars" id="stars">
      <button class="star-btn empty" data-rating="1"><svg viewBox="0 0 24 24" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
      <button class="star-btn empty" data-rating="2"><svg viewBox="0 0 24 24" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
      <button class="star-btn empty" data-rating="3"><svg viewBox="0 0 24 24" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
      <button class="star-btn empty" data-rating="4"><svg viewBox="0 0 24 24" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
      <button class="star-btn empty" data-rating="5"><svg viewBox="0 0 24 24" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
    </div>
    <textarea class="feedback-textarea" id="feedbackText" placeholder="请告诉我们哪里可以改进..."></textarea>
    <button class="submit-btn" id="submitBtn">提交反馈</button>
    <a href="javascript:history.back()" class="back-link">← 返回</a>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/login.html'; }

    let selectedRating = 0;
    const starBtns = document.querySelectorAll('.star-btn');
    const textarea = document.getElementById('feedbackText');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    starBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        selectedRating = parseInt(btn.dataset.rating);
        starBtns.forEach((b, i) => {
          b.className = 'star-btn ' + (i < selectedRating ? 'filled' : 'empty');
        });
        if (selectedRating >= 3) {
          textarea.style.display = 'none';
          submitBtn.style.display = 'none';
          submitFeedback();
        } else {
          textarea.style.display = 'block';
          submitBtn.style.display = 'block';
        }
      });
    });

    async function submitFeedback() {
      submitBtn.disabled = true;
      const body = { rating: selectedRating };
      if (selectedRating < 3) body.content = textarea.value.trim();
      try {
        const res = await fetch('/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (res.ok) {
          showToast('感谢您的评价！');
          setTimeout(() => { if (selectedRating >= 3) history.back(); }, 1500);
        } else {
          showToast(data.error || '提交失败');
        }
      } catch {
        showToast('网络错误');
      }
      submitBtn.disabled = false;
    }

    submitBtn.addEventListener('click', submitFeedback);
  </script>
</body>
</html>
