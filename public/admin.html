<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审批</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    .admin-page { max-width: 1000px; margin: 0 auto; padding-top: 44px; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; background: #0f0f0f; color: #fff; }
    .upload-body { padding: 20px; }
    /* 覆盖全局 titlebar 为暗色主题 */
    .titlebar { background: #1a1a1a; }
    .titlebar::after { background: rgba(255,255,255,0.12); }
    .titlebar .titlebar-back::before { border-left-color: #fff; border-bottom-color: #fff; }
    .titlebar .titlebar-title { color: #fff; }
    .titlebar .titlebar-checkbox { color: #aaa; }
    /* .count-badge { display: inline-block; background: #ff4757; color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 10px; margin-left: 7px; } */
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .admin-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; position: relative; }
    .admin-card .card-checkbox { position: absolute; top: 8px; left: 8px; z-index: 5; width: 20px; height: 20px; accent-color: #4a9eff; cursor: pointer; }
        /* 使复选框的外观更接近圆形 */
input[type="checkbox"] {
  border-radius: 50%;
  width: 20px;
  height: 20px;
  border: 2px solid #666;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  background: transparent;
  cursor: pointer;
  position: relative;
}
input[type="checkbox"]:checked {
  background: #7c3aed;
  border-color: #7c3aed;
}

/* 选中时对勾，精确居中 */
input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  left: 50%;
  top: 45%;
  width: 5px;
  height: 9px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: translate(-50%, -50%) rotate(45deg);
}
    .admin-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; cursor: pointer; }
    .admin-card .info { display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 12px; padding: 12px; }
    .admin-card .title { font-size: 14px; color: #ddd; }
    .admin-card .meta { font-size: 12px; color: #888; }
    .admin-card .meta-row { width: 100%; display: flex; justify-content: space-between; font-size: 11px; color: #666; margin-bottom: 4px; }
    .admin-card .actions { width: 100%; display: flex; gap: 8px; }
    .btn-approve, .btn-reject { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .btn-approve { background: #2ed573; color: white; }
    .btn-reject { background: #ff4757; color: #fff; }
    .btn-approve:hover { opacity: 0.8; }
    .btn-reject:hover { opacity: 0.8; }
    .empty-msg { text-align: center; color: #666; margin-top: 60px; }
    .count-badge { display: inline-block; background: #ff4757; color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 10px; margin-left: 7px; }
    .batch-toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; padding: 12px 20px; display: flex; gap: 12px; justify-content: center; z-index: 100; border-top: 1px solid #2a2a2a; transform: translateY(100%); transition: transform 0.25s ease; }
    .batch-toolbar.visible { transform: translateY(0); }
    .batch-toolbar button { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .batch-toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-batch-approve { background: #2ed573; color: white; }
    .btn-batch-reject { background: #ff4757; color: #fff; }
    @media (max-width: 768px) {
      .admin-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .admin-grid { grid-template-columns: 1fr; }
    }
  </style>
  <style>.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:12px 24px;border-radius:8px;z-index:9999;font-size:14px;pointer-events:none;opacity:0;transition:opacity .3s}.toast.show{opacity:1}</style>
</head>
<body>
<div class="admin-page">
  <div class="titlebar">
    <a href="javascript:history.back()" class="titlebar-back" onclick="event.preventDefault();history.back()"></a>
    <span class="titlebar-title">图片审批 <span class="count-badge" id="pendingCount">0</span></span>
    <div class="titlebar-right">
      <label class="titlebar-checkbox" id="selectAllLabel">
        <input type="checkbox" id="selectAllCheckbox" style="border: 1px solid white" onchange="toggleSelectAll()"> 全选
      </label>
    </div>
  </div>
  <div class="upload-body">
  <div class="admin-grid" id="adminGrid"></div>
  <p class="empty-msg" id="emptyMsg" style="display:none">暂无待审批图片</p>
</div>
<div class="batch-toolbar" id="batchToolbar">
  <button class="btn-batch-approve" id="btnBatchApprove" disabled onclick="batchAction('approve')">批量通过 (<span id="batchCount">0</span>)</button>
  <button class="btn-batch-reject" id="btnBatchReject" disabled onclick="batchAction('reject')">批量拒绝 (<span id="batchCount2">0</span>)</button>
</div>
<script src="js/fallback.js"></script>
<script src="js/admin-page.js"></script>
</body>
</html>
