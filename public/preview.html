<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>预览</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      overflow: hidden;
      height: 100vh; /* fallback */
      height: 100dvh;
    }

    .preview-container {
      display: flex;
      flex-direction: column;
      height: 100vh; /* fallback */
      height: 100dvh;
    }

    .top-bar {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.7);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    .top-bar .back-btn {
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      margin-right: 16px;
      line-height: 1;
    }

    .top-bar .counter {
      font-size: 14px;
      color: #aaa;
    }

    .carousel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      touch-action: pan-y;
      user-select: none;
      -webkit-user-select: none;
      margin-top: 48px;
    }

    .carousel-inner {
      display: flex;
      transition: transform 0.3s ease;
      height: 100%;
      width: 100%;
    }

    .carousel-slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .carousel-slide img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .carousel-btn.left {
      left: 16px;
    }

    .carousel-btn.right {
      right: 16px;
    }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      min-height: 52px;
      margin-bottom: 56px;
    }

    .carousel-dots:empty {
      display: none;
    }

    .carousel-thumb {
      width: 42px;
      height: 42px;
      border-radius: 4px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid #444;
      flex-shrink: 0;
      opacity: 0.5;
      transition: border-color 0.2s, opacity 0.2s, transform 0.2s;
    }

    .carousel-thumb.active {
      border-color: #4a9eff;
      opacity: 1;
      transform: scale(1.12);
    }

    .bottom-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(20, 20, 20, 0.95);
      z-index: 100;
    }

    .panel-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid #333;
    }

    .panel-title {
      font-size: 14px;
      color: #ddd;
    }

    .panel-actions {
      display: flex;
      gap: 16px;
    }

    .action-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .action-btn.liked {
      color: #ff4757;
    }

    .action-btn .count {
      font-size: 12px;
    }

    .comment-panel {
      max-height: 140px;
      overflow-y: auto;
      padding: 0 16px;
    }

    .comment-item {
      padding: 8px 0;
      border-bottom: 1px solid #222;
    }

    .comment-item .c-user {
      font-size: 12px;
      color: #4a9eff;
      margin-bottom: 2px;
    }

    .comment-item .c-text {
      font-size: 13px;
      color: #ccc;
    }

    .comment-item .c-time {
      font-size: 11px;
      color: #666;
    }

    .comment-input-row {
      display: flex;
      padding: 8px 16px;
      gap: 8px;
    }

    .comment-input-row input {
      flex: 1;
      padding: 8px 12px;
      background: #222;
      border: 1px solid #333;
      border-radius: 20px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }

    .comment-input-row input:focus {
      border-color: #4a9eff;
    }

    .comment-input-row button {
      padding: 8px 16px;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }

    .no-comments {
      text-align: center;
      color: #666;
      padding: 16px 0;
      font-size: 13px;
    }

    @media (max-width: 768px) {
      .carousel-btn {
        width: 32px;
        height: 32px;
        font-size: 14px;
      }

      .panel-title {
        font-size: 13px;
      }
    }

    .save-btn {
      position: fixed;
      z-index: 200;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .save-btn:active {
      background: rgba(255, 255, 255, 0.25);
    }

    .save-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 768px) {
      .save-btn {
        top: 12px;
        right: 12px;
      }
    }

    @media (min-width: 769px) {
      .save-btn {
        bottom: 24px;
        right: 24px;
      }
    }
  </style>
</head>

<body>
  <button class="save-btn" id="saveBtn" title="保存图片">
    <svg viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
      <polyline points="7 10 12 15 17 10" />
      <line x1="12" y1="15" x2="12" y2="3" />
    </svg>
  </button>
  <div class="preview-container">
    <div class="top-bar">
      <a href="javascript:history.back()" class="back-btn" onclick="event.preventDefault();history.back()">←</a>
      <span class="counter" id="counter">1 / 1</span>
    </div>

    <div class="carousel" id="carousel">
      <div class="carousel-inner" id="carouselInner"></div>
      <button class="carousel-btn left" id="btnPrev" onclick="navigate(-1)">‹</button>
      <button class="carousel-btn right" id="btnNext" onclick="navigate(1)">›</button>
    </div>
    <div class="carousel-dots" id="carouselDots"></div>


    <div class="bottom-panel" id="bottomPanel">
      <div class="panel-info">
        <span class="panel-title" id="panelTitle">加载中...</span>
        <div class="panel-actions">
          <button class="action-btn" id="btnLike" onclick="toggleLike()">
            <span id="likeIcon">♡</span>
            <span class="count" id="likeCount">0</span>
          </button>
          <button class="action-btn" id="btnCommentToggle" onclick="toggleComment()">
            <span>💬</span>
            <span class="count" id="commentCount">0</span>
          </button>
        </div>
      </div>
      <div class="comment-panel" id="commentList" style="display:none">
        <p class="no-comments">暂无评论</p>
      </div>
      <div class="comment-input-row" id="commentInputRow" style="display:none">
        <input type="text" id="commentInput" placeholder="写下你的评论...">
        <button onclick="submitComment()">发送</button>
      </div>
    </div>
  </div>
  <script src="js/fallback.js"></script>
  <script src="js/preview-page.js"></script>
</body>

</html>
