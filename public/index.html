<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>图库 - 无限制</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ======== Top Navbar ======== -->
<nav class="navbar">
  <div class="navbar-left">
    <button class="btn-more" id="btnMore" onclick="toggleMobileSidebar()" aria-label="更多分类">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="/" class="navbar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      图库
    </a>
    <div class="navbar-links" id="navbarLinks"></div>
  </div>
  <div class="navbar-right">
    <button class="btn-login" id="loginBtn" onclick="window.location.href='/login.html'">登录</button>
    <div class="user-area hidden" id="userArea" onclick="toggleDropdown()">
      <div class="user-avatar" id="userAvatar">?</div>
      <span class="user-name" id="userName"></span>
      <div class="user-dropdown" id="userDropdown">
        <a href="/profile.html">个人资料</a>
        <a href="/my-images.html">我的发布</a>
        <a href="/admin.html" id="adminLink" style="display:none">图片审批</a>
        <button onclick="event.stopPropagation();logout()">退出登录</button>
      </div>
    </div>
  </div>
</nav>

<!-- ======== Sidebar ======== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-item active" data-category="" onclick="selectCategory('', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>全部</span>
  </div>
  <div class="sidebar-item" data-category="wallpaper" onclick="selectCategory('wallpaper', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 17l5-5 4 4 4-8 7 9h0"/><rect x="2" y="14" width="20" height="8" rx="1"/></svg>
    <span>壁纸</span>
  </div>
  <div class="sidebar-item" data-category="anime" onclick="selectCategory('anime', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
    <span>动漫</span>
  </div>
  <div class="sidebar-item" data-category="beauty" onclick="selectCategory('beauty', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>美女</span>
  </div>
  <div class="sidebar-item" data-category="other" onclick="selectCategory('other', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    <span>其他</span>
  </div>
</aside>

<!-- ======== Sidebar Overlay (mobile) ======== -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

<!-- ======== Main Content ======== -->
<div class="main-content">
  <div class="home-content-area" id="homeContentArea">
    <div class="gallery" id="gallery"></div>
    <div class="state-message hidden" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p>暂无图片，快去上传吧</p>
    </div>
  </div>
</div>

<!-- ======== FAB ======== -->
<div class="fab-container" id="fabContainer">
  <button class="fab fab-feedback hidden" id="fabFeedback" onclick="window.location.href='/feedback.html'" title="我的反馈">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  </button>
  <button class="fab fab-upload hidden" id="fabUpload" onclick="goUpload()" title="上传图片">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <button class="fab fab-top" id="fabTop" onclick="scrollToTop()" title="回到顶部">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
</div>

<script src="js/fallback.js"></script>
<script src="js/app.js"></script>
<script>
(function logLayoutHeights() {
  var panel = document.createElement('div');
  panel.id = '__debug_panel';
  panel.style.cssText = 'position:fixed;bottom:10px;right:10px;z-index:99999;background:rgba(0,0,0,0.85);color:#0f0;font:11px/1.5 monospace;padding:10px;border-radius:6px;max-width:90vw;max-height:50vh;overflow-y:auto;white-space:pre-wrap;pointer-events:none;display:none;';
  document.body.appendChild(panel);

  function measure() {
    var navbar = document.querySelector('.navbar') || document.querySelector('.top-bar');
    var mainContent = document.querySelector('.main-content');
    var homeArea = document.querySelector('.home-content-area');
    var body = document.body;
    return {
      'innerHeight': window.innerHeight,
      'scrollY': window.scrollY,
      'body.scrollTop': body.scrollTop,
      'body.offsetH': body.offsetHeight,
      'navbar.offsetH': navbar ? navbar.offsetHeight : 'null',
      'navbar.rect.top': navbar ? Math.round(navbar.getBoundingClientRect().top) : 'null',
      'main.offsetH': mainContent ? mainContent.offsetHeight : 'null',
      'main.rect.top': mainContent ? Math.round(mainContent.getBoundingClientRect().top) : 'null',
      'home.offsetH': homeArea ? homeArea.offsetHeight : 'null',
      'home.rect.top': homeArea ? Math.round(homeArea.getBoundingClientRect().top) : 'null',
      '--navbar-h': getComputedStyle(document.documentElement).getPropertyValue('--navbar-height').trim()
    };
  }

  var loadLog = measure();

  // ── 三击头像切换面板（仅管理员）─────────────────
  var avatarEl = document.getElementById('userAvatar');
  var tapCount = 0;
  var tapTimer = null;
  if (avatarEl) {
    avatarEl.addEventListener('click', function(e) {
      if (!window.__isAdmin) return;
      tapCount++;
      if (tapCount === 1) {
        tapTimer = setTimeout(function() { tapCount = 0; }, 800);
      }
      if (tapCount >= 3) {
        clearTimeout(tapTimer);
        tapCount = 0;
        panel.style.display = (panel.style.display === 'none' ? 'block' : 'none');
        e.stopPropagation();
      }
    });
  }

  var lines = ['=== 首次加载 ==='];
  Object.keys(loadLog).forEach(function(k) { lines.push(k + ': ' + loadLog[k]); });
  panel.textContent = lines.join('\n');

  window.addEventListener('pageshow', function(e) {
    if (e.persisted) {
      var restoreLog = measure();
      var diff = [];
      Object.keys(restoreLog).forEach(function(k) {
        if (restoreLog[k] !== loadLog[k]) {
          diff.push('✗ ' + k + ': ' + loadLog[k] + ' → ' + restoreLog[k]);
        }
      });
      lines.push('', '=== bfcache 恢复 ===');
      Object.keys(restoreLog).forEach(function(k) { lines.push(k + ': ' + restoreLog[k]); });
      if (diff.length) {
        lines.push('', '=== 差异 ===');
        diff.forEach(function(d) { lines.push(d); });
      }
      panel.textContent = lines.join('\n');
    }
  });
})();
</script>
</body>
</html>
