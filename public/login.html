<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    html,
    body {
      overflow: hidden;
    }

    .auth-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: #f5f5f5;
      padding-top: 44px;
    }

    .titlebar {
      background: #fff;
    }

    .auth-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-box {
      width: 100%;
      max-width: 360px;
      background: #fff;
      border-radius: 12px;
      padding: 32px 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .auth-box h2 {
      color: #333;
      text-align: center;
      margin-bottom: 8px;
      font-size: 22px;
    }

    .auth-box .subtitle {
      color: #888;
      text-align: center;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .auth-box .toggle-link {
      color: #6c5ce7;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      color: #555;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 8px;
      color: #333;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }

    .form-group input:focus {
      border-color: #6c5ce7;
    }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: #6c5ce7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
    }

    .auth-btn:hover {
      background: #5a4bd1;
    }

    .auth-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .success-msg {
      color: #27ae60;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <div class="titlebar">
      <a href="javascript:history.back()" class="titlebar-back" onclick="event.preventDefault();history.back()"></a>
      <span class="titlebar-title" id="formTitle">登录</span>
      <div class="titlebar-right"></div>
    </div>
    <div class="auth-body">
      <div class="auth-box">
        <h2 id="formTitle">登录</h2>
        <p class="subtitle">
          <span id="formSub">还没有账号？</span>
          <span class="toggle-link" id="toggleForm" onclick="toggleAuthMode()">立即注册</span>
        </p>
        <form id="authForm">
          <div class="form-group" id="usernameGroup" style="display:none">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
          </div>
          <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" placeholder="请输入邮箱" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
          </div>
          <button type="submit" class="auth-btn" id="submitBtn">登录</button>
          <p class="error-msg" id="errorMsg"></p>
          <p class="success-msg" id="successMsg"></p>
        </form>
      </div>
    </div>
  </div>
  <script src="js/auth-page.js"></script>
</body>

</html>
