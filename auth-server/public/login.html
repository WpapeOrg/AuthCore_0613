<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f0f0f; padding: 20px; }
    .auth-box { background: #1a1a1a; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; }
    .auth-box h2 { color: #fff; text-align: center; margin-bottom: 8px; }
    .auth-box .subtitle { color: #888; text-align: center; margin-bottom: 24px; font-size: 14px; }
    .auth-box .toggle-link { color: #4a9eff; cursor: pointer; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; color: #aaa; margin-bottom: 6px; font-size: 13px; }
    .form-group input { width: 100%; padding: 10px 12px; background: #222; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; outline: none; box-sizing: border-box; }
    .form-group input:focus { border-color: #4a9eff; }
    .auth-btn { width: 100%; padding: 12px; background: #4a9eff; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 8px; }
    .auth-btn:hover { background: #3a8eef; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { color: #ff4757; font-size: 13px; margin-top: 8px; display: none; }
    .success-msg { color: #2ed573; font-size: 13px; margin-top: 8px; display: none; }
    .back-link { display: block; text-align: center; color: #888; margin-top: 16px; text-decoration: none; font-size: 13px; }
    .back-link:hover { color: #aaa; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <h2 id="formTitle">登录</h2>
    <p class="subtitle">
      <span id="formSub">还没有账号？</span>
      <span class="toggle-link" id="toggleForm" onclick="toggleAuthMode()">立即注册</span>
    </p>
    <form id="authForm">
      <div class="form-group" id="usernameGroup" style="display:none">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="email">邮箱</label>
        <input type="email" id="email" placeholder="请输入邮箱" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
      </div>
      <button type="submit" class="auth-btn" id="submitBtn">登录</button>
      <p class="error-msg" id="errorMsg"></p>
      <p class="success-msg" id="successMsg"></p>
    </form>
    <a href="/" class="back-link">← 返回首页</a>
  </div>
</div>
<script src="js/auth-page.js"></script>
</body>
</html>
