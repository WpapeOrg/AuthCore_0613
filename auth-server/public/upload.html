<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .upload-page { max-width: 600px; margin: 0 auto; padding: 20px; min-height: 100vh; background: #0f0f0f; color: #fff; }
    .upload-page h2 { margin-bottom: 20px; }
    .upload-area { border: 2px dashed #444; border-radius: 12px; padding: 60px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s; background: #1a1a1a; }
    .upload-area:hover, .upload-area.drag-over { border-color: #4a9eff; }
    .upload-area p { color: #888; }
    .upload-area .icon { font-size: 48px; display: block; margin-bottom: 12px; }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin: 16px 0; }
    .preview-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #222; }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-item .remove-btn { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; background: rgba(255,0,0,0.8); color: #fff; border: none; border-radius: 50%; cursor: pointer; font-size: 14px; line-height: 24px; text-align: center; }
    .form-row { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-end; }
    .form-row .form-group { flex: 1; margin-bottom: 0; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; color: #aaa; margin-bottom: 6px; font-size: 13px; }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; background: #222; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; outline: none; box-sizing: border-box; }
    .form-group input:focus, .form-group select:focus { border-color: #4a9eff; }
    .form-group select option { background: #222; color: #fff; }
    .submit-btn { width: 100%; padding: 12px; background: #4a9eff; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 8px; }
    .submit-btn:hover { background: #3a8eef; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .back-link { display: block; text-align: center; color: #888; margin-top: 16px; text-decoration: none; font-size: 13px; }
    .info-msg { color: #aaa; font-size: 12px; margin-top: 4px; }
    #fileInput { display: none; }
    .progress-bar { height: 4px; background: #4a9eff; border-radius: 2px; margin-top: 12px; transition: width 0.3s; display: none; }
  </style>
</head>
<body>
<div class="upload-page">
  <h2>上传图片</h2>
  <div class="upload-area" id="dropZone">
    <span class="icon">📷</span>
    <p>点击选择或拖拽图片到此处</p>
    <p class="info-msg">支持 JPG / PNG / GIF / WebP，单次最多 20 张</p>
  </div>
  <input type="file" id="fileInput" multiple accept="image/*">
  <div class="preview-grid" id="previewGrid"></div>
  <div class="form-row">
    <div class="form-group">
      <label for="title">标题</label>
      <input type="text" id="title" placeholder="图片标题（可选）">
    </div>
  </div>
  <div class="form-group">
    <label for="category">分类</label>
    <select id="category"><option value="">加载中...</option></select>
  </div>
  <div class="form-group">
    <label for="tags">标签</label>
    <input type="text" id="tags" placeholder="多个标签用逗号分隔（可选）">
  </div>
  <button class="submit-btn" id="submitBtn" disabled>上传（请先选择图片）</button>
  <div class="progress-bar" id="progressBar"></div>
  <a href="/" class="back-link">← 返回首页</a>
</div>
<script src="js/fallback.js"></script>
<script src="js/upload-page.js"></script>
</body>
</html>
